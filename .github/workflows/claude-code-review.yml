name: Claude Code PR Review
on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

jobs:
  review-with-tracking:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Configure gh aliases for review-thread operations
        run: |
          gh alias set --shell list-review-threads 'gh api graphql -f query="query(\$owner:String!,\$repo:String!,\$pr:Int!){repository(owner:\$owner,name:\$repo){pullRequest(number:\$pr){reviewThreads(first:100){nodes{id isResolved isOutdated comments(first:1){nodes{author{login} body path line}}}}}}}" -F owner="$1" -F repo="$2" -F pr="$3"'
          gh alias set --shell resolve-thread 'gh api graphql -f query="mutation(\$id:ID!){resolveReviewThread(input:{threadId:\$id}){thread{isResolved}}}" -F id="$1"'

      - name: Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a comprehensive code review with the following focus areas:

            1. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. **Security**
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic

            3. **Performance**
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues

            4. **Testing**
               - Verify adequate test coverage
               - Review test quality and edge cases
               - Check for missing test scenarios

            5. **Documentation**
               - Ensure code is properly documented
               - Verify README updates for new features
               - Check API documentation accuracy

            Provide detailed feedback using inline comments for specific issues.
            Use top-level comments for general observations or praise.

            **Resolving your own stale review threads:**

            Before posting new comments, list existing review threads on this PR using the
            preconfigured alias:

              gh list-review-threads ${{ github.repository_owner }} ${{ github.event.repository.name }} ${{ github.event.pull_request.number }}

            For each thread where ALL of the following hold:
              - `isResolved` is false
              - the first comment's `author.login` is `github-actions[bot]`
              - the concern is no longer applicable in the current diff (file/line gone,
                code rewritten, issue addressed)

            resolve it with:

              gh resolve-thread <thread-id>

            Do not resolve threads from human reviewers under any circumstance, even if the
            concern looks addressed — leave that decision to the reviewer. Only the two
            aliases above are available; raw `gh api graphql` is not permitted.

          # Tools for comprehensive PR review
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github__get_issue_comments,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh list-review-threads:*),Bash(gh resolve-thread:*)"
            --model "claude-opus-4-6"
