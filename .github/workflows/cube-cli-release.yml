name: Cube CLI Release

on:
  push:
    tags:
      - 'cube-cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. cube-cli-v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — fully static single binaries (musl + rustls, no OpenSSL).
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          # macOS — Intel and Apple Silicon.
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          # Windows.
          - os: windows-2022
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache-workspaces: rust/cube-cli

      - name: Build
        working-directory: rust/cube-cli
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bindir="rust/cube-cli/target/${{ matrix.target }}/release"
          mkdir -p dist
          tar -C "$bindir" -czf "dist/cube-${{ matrix.target }}.tar.gz" cube

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "rust/cube-cli/target/${{ matrix.target }}/release/cube.exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path $bin -DestinationPath "dist/cube-${{ matrix.target }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cube-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect archives and checksums
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} dist/ \;
          cd dist
          sha256sum * > SHA256SUMS
          echo "Release assets:"
          ls -l

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
