  /v1/embed/dashboard/{publicId}:
    get:
      description: >-
        Returns the dashboard identified by its `publicId` — including its reports/widgets —
        resolved within the caller's embed session scope, for rendering inside an embedded view.


        Access is authorized against the embed user: the dashboard is returned when the user owns
        its workbook, has been granted workbook access (folder-based or direct), holds
        `EmbedDashboardRead` on the dashboard, or when it has been shared with all embed users
        (creator-mode flow). Returns `404` if the dashboard does not exist or is not visible to the
        caller.


        Signed embedding additionally requires the dashboard to have "Allow signed embedding"
        enabled; the trusted screenshoter and creator-mode session flows are exempt. Returns `403`
        when embedding is not permitted for the dashboard.
      operationId: getDashboard
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
          description: ''
      summary: Get an embeddable dashboard
      tags:
        - Embed
  /v1/embed/generate-session:
    post:
      description: >-
        **🔒 Admin only.** Requires administrator privileges — the authenticated principal (API key,
        embed JWT, or any bearer token) must belong to a user with the admin role.


        Creates a one-time embed session for a deployment and returns its `sessionId`.


        The session captures the embed context that will be baked into the embed token once redeemed
        — the target `deploymentId`, the end user's identity (`externalId` / `email` /
        `userProfile`), their `groups` and `userAttributes`, and an optional `securityContext`.
        Exchange the returned `sessionId` for a signed embed JWT via `POST
        /api/v1/embed/session/token` (single use).


        `deploymentId` is required and the caller must have read access to it. Embedding must be
        enabled for the tenant, otherwise `403` is returned.
      operationId: generateSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateSession'
        description: GenerateSessionDTO
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateSessionResponse'
          description: ''
      summary: Generate an embed session
      tags:
        - Embed
  /v1/embed/session/token:
    post:
      description: >-
        Exchanges a one-time embed session id (created via `POST /api/v1/embed/generate-session`)
        for a signed, short-lived embed JWT used to authenticate the embedded analytics in the
        browser.


        The session is **single-use**: it is consumed (deleted) on the first successful exchange, so
        a given `sessionId` can be redeemed only once. The returned token is signed with the
        tenant's embed secret, issued by `cubecloud`, and expires after 24 hours.


        This endpoint is unauthenticated — it is called from the embedding client and the session id
        itself is the credential. Returns `401` if the session id is unknown or has already been
        redeemed.
      operationId: postTokenBySessionId
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostTokenBySessionIdInput'
        description: PostTokenBySessionIdInputDTO
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateEmbedTokenResponse'
          description: ''
      summary: Exchange a session for an embed token
      tags:
        - Embed
