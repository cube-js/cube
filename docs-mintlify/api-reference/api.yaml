openapi: 3.1.0
info:
  title: Cube Cloud REST API
  version: 1.0.0
  description: |-
    Programmatically manage Cube Cloud: deployments and everything scoped to them
    (environments, folders, reports, workbooks, notifications, workspace, and agents),
    plus account-level users, groups, policies, embedding, and AI settings.
servers:
  - url: https://{tenant}.cubecloud.dev/api
    description: Cube Cloud API base URL. Replace the whole host if you use a custom domain.
    variables:
      tenant:
        default: your-tenant
        description: Your Cube Cloud tenant subdomain
security:
  - apiKey: []
tags:
  - name: Deployments
  - name: Environments
  - name: Folders
  - name: Reports
  - name: Workbooks
  - name: Notifications
  - name: Workspace
  - name: Agents
  - name: Metadata
  - name: Users
  - name: Groups
  - name: User Groups
  - name: User Attributes
  - name: Resource Policies
  - name: App Theme
  - name: AI Engineer
  - name: Embed
  - name: Embed Tenants
paths:
  /v1/ai-engineer/active-region:
    get:
      operationId: getMyActiveAgentRegion
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveAgentRegion'
          description: ''
      summary: Get my active agent region
      tags:
        - AI Engineer
  /v1/ai-engineer/settings:
    get:
      operationId: getAIEngineerSettings
      parameters:
        - in: query
          name: deploymentId
          required: false
          schema:
            type: number
        - in: query
          name: agentId
          required: false
          schema:
            type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIEngineerSettings'
          description: ''
      summary: Get ai engineer settings
      tags:
        - AI Engineer
  /v1/app-theme:
    get:
      operationId: getAppTheme
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppThemeResponse'
          description: ''
      summary: Get app theme
      tags:
        - App Theme
  /v1/deployments:
    get:
      operationId: getDeployments
      parameters:
        - in: query
          name: creationStep
          required: false
          schema:
            oneOf:
              - items:
                  enum:
                    - project
                    - upload
                    - schema
                    - github
                    - ssh
                    - databases
                    - ready
                    - demo
                  type: string
                type: array
                $ref: '#/components/schemas/CreationStep'
              - type: array
                items:
                  $ref: '#/components/schemas/CreationStep'
        - in: query
          name: offset
          required: false
          schema:
            oneOf:
              - minimum: 0
                type: integer
              - type: 'null'
            type: integer
            minimum: 0
        - in: query
          name: limit
          required: false
          schema:
            oneOf:
              - minimum: 0
                type: integer
              - type: 'null'
            type: integer
            minimum: 0
        - in: query
          name: first
          required: false
          schema:
            type: integer
            minimum: 1
          description: Page size for cursor-based pagination
        - in: query
          name: after
          required: false
          schema:
            minimum: 1
            type: string
          description: Cursor for fetching the next page
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentsListResponse'
          description: ''
      summary: Get deployments
      tags:
        - Deployments
  /v1/deployments/{deploymentId}:
    get:
      operationId: getDeployment
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
          description: ''
      summary: Get deployment
      tags:
        - Deployments
  /v1/deployments/{deploymentId}/agent-skills:
    get:
      operationId: getAgentSkills
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: number
        - in: query
          name: space
          schema:
            oneOf:
              - type: string
              - type: 'null'
        - in: query
          name: branchName
          schema:
            oneOf:
              - type: string
              - type: 'null'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSkillsResponse'
          description: ''
      summary: Get agent skills
      tags:
        - Agents
  /v1/deployments/{deploymentId}/agents:
    get:
      operationId: getAgents
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: number
        - in: query
          name: allowEmbedding
          schema:
            oneOf:
              - type: boolean
              - type: 'null'
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Agent'
                type: array
          description: ''
      summary: Get agents
      tags:
        - Agents
  /v1/deployments/{deploymentId}/environments:
    get:
      operationId: getDeploymentEnvironments
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
        - in: query
          name: type
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/GetDeploymentEnvironmentsQueryType'
              - type: 'null'
            type: string
            enum:
              - production
              - staging
              - development
        - in: query
          name: offset
          required: false
          schema:
            oneOf:
              - minimum: 0
                type: integer
              - type: 'null'
            type: integer
            minimum: 0
        - in: query
          name: limit
          required: false
          schema:
            oneOf:
              - minimum: 0
                type: integer
              - type: 'null'
            type: integer
            minimum: 0
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentEnvironmentsListResponse'
          description: ''
      summary: Get deployment environments
      tags:
        - Environments
  /v1/deployments/{deploymentId}/environments/{environmentId}/tokens:
    get:
      operationId: getDeploymentEnvironmentTokens
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
        - in: path
          name: environmentId
          required: true
          schema:
            type: integer
        - in: query
          name: offset
          required: false
          schema:
            oneOf:
              - minimum: 0
                type: integer
              - type: 'null'
            type: integer
            minimum: 0
        - in: query
          name: limit
          required: false
          schema:
            oneOf:
              - minimum: 0
                type: integer
              - type: 'null'
            type: integer
            minimum: 0
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentEnvironmentTokensListResponse'
          description: ''
      summary: Get deployment environment tokens
      tags:
        - Environments
    post:
      operationId: createDeploymentEnvironmentToken
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
        - in: path
          name: environmentId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentEnvironmentTokenInput'
        description: CreateDeploymentEnvironmentTokenInput
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentEnvironmentTokenResponse'
          description: ''
      summary: Create deployment environment token
      tags:
        - Environments
  /v1/deployments/{deploymentId}/environments/{environmentId}/tokens-for-meta-sync:
    post:
      operationId: createDeploymentEnvironmentTokenForMetaSync
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
        - in: path
          name: environmentId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentEnvironmentTokenInput'
        description: CreateDeploymentEnvironmentTokenInput
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentEnvironmentTokenResponse'
          description: ''
      summary: Create deployment environment token for meta sync
      tags:
        - Environments
  /v1/deployments/{deploymentId}/folders:
    get:
      description: >-
        List the folders in a deployment's workspace.


        By default this returns the folders at the workspace root. Pass the `parentId` query
        parameter to list the direct children of a specific folder instead.


        Results are scoped to the calling user: only folders the user can see are returned. A folder
        is visible when the user owns it, has been granted access to it directly, or has access to
        something inside it (a sub-folder, workbook, or dashboard), in which case the ancestor
        folders are surfaced as navigation.


        This endpoint is not recursive — it returns a single level of the folder tree per call. Use
        `parentId` to walk deeper, or `GET /folders/{folderId}/ancestors` to resolve a breadcrumb
        path.


        Results are returned in pages using cursor-based pagination: pass `first` to set the page
        size and `after` (the previous response's `pageInfo.endCursor`) to fetch the next page. The
        legacy `data` and `count` fields are still populated for backwards compatibility but are
        deprecated in favour of `items` and `pageInfo`.
      operationId: getFolders
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: number
        - in: query
          name: parentId
          schema:
            oneOf:
              - minimum: 0
                type: integer
              - type: 'null'
        - in: query
          name: after
          schema:
            type: string
        - in: query
          name: first
          schema:
            minimum: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoldersListResponse'
          description: ''
      summary: List folders
      tags:
        - Folders
    post:
      description: >-
        Create a new folder in a deployment's workspace.


        Provide a `name`, and optionally a `parentId` to nest the folder inside an existing one
        (omit it to create the folder at the workspace root). An optional `position` controls the
        folder's ordering among its siblings.


        Requires the **AI BI User** role (or higher). When `parentId` is set, the caller must
        additionally have **edit** or **manage** access to that parent folder.


        Folders can be nested up to a fixed maximum depth; exceeding it returns `400`.
      operationId: createFolder
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: number
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFolderInput'
        description: CreateFolderInput
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Folder'
          description: ''
      summary: Create a folder
      tags:
        - Folders
  /v1/deployments/{deploymentId}/folders/{folderId}:
    delete:
      description: >-
        Delete a folder from a deployment's workspace. Responds with `204 No Content` on success.


        The folder must be empty of sub-folders: if it still has child folders, the request is
        rejected with `400` — delete or move the sub-folders first.


        Content directly inside the folder (workbooks, dashboards, reports) is **not** deleted. It
        is detached and returned to the workspace root.


        Requires **manage** access to the folder. Returns `404` if the folder does not exist or
        belongs to a different deployment.
      operationId: deleteFolder
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: number
        - in: path
          name: folderId
          required: true
          schema:
            type: number
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
      summary: Delete a folder
      tags:
        - Folders
    put:
      description: >-
        Update a folder's metadata — its `name` and/or its `position` among its siblings. Both
        fields are optional; only the fields you send are changed.


        This endpoint does **not** move a folder to a different parent. To re-parent a folder, use
        `POST /workspace/move` with `type: FOLDER`.


        Requires **edit** access to the folder. Returns `404` if the folder does not exist or
        belongs to a different deployment.
      operationId: updateFolder
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: number
        - in: path
          name: folderId
          required: true
          schema:
            type: number
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFolderInput'
        description: UpdateFolderInput
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Folder'
          description: ''
      summary: Update a folder
      tags:
        - Folders
  /v1/deployments/{deploymentId}/folders/{folderId}/ancestors:
    get:
      description: >-
        Return the ancestor chain of a folder, ordered from the workspace root down to (and
        including) the folder itself.


        Use this to render a breadcrumb path for a nested folder. For example, for `Root / Sales /
        Q1` requested on the `Q1` folder, the response is `[Root, Sales, Q1]`.


        Requires visibility access to the target folder. Returns `404` if the folder does not exist
        or belongs to a different deployment.
      operationId: getFolderAncestors
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: number
        - in: path
          name: folderId
          required: true
          schema:
            type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Folder'
                type: array
          description: ''
      summary: List folder ancestors
      tags:
        - Folders
  /v1/deployments/{deploymentId}/notifications:
    get:
      description: >-
        **🔒 Admin only.** Requires administrator privileges — the authenticated principal (API key,
        embed JWT, or any bearer token) must belong to a user with the admin role.


        Returns the deployment’s scheduled notifications (recurring dashboard runs), ordered by
        creation time (newest first) and cursor-paginated. Optionally filter to a single dashboard
        with `dashboardId`. Each item describes the schedule only; recipients are managed through
        the `/recipients` sub-resource.
      operationId: getNotifications
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
          description: Numeric id of the deployment that owns the notification.
        - in: query
          name: dashboardId
          required: false
          schema:
            oneOf:
              - minimum: 1
                type: integer
              - type: 'null'
            type: integer
            minimum: 1
          description: 'Optional filter: only return notifications for this dashboard id.'
        - in: query
          name: first
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
          description: Page size for cursor pagination (default 100, max 200).
        - in: query
          name: after
          required: false
          schema:
            minimum: 1
            type: string
          description: Opaque cursor for the next page; pass the previous response's `pageInfo.endCursor`.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationsListResponse'
          description: ''
      summary: List scheduled notifications
      tags:
        - Notifications
    post:
      description: >-
        **🔒 Admin only.** Requires administrator privileges — the authenticated principal (API key,
        embed JWT, or any bearer token) must belong to a user with the admin role.


        Creates a scheduled notification — a recurring run of a dashboard whose rendered result is
        delivered to its recipients. The cadence is set by `scheduleType` plus the relevant time
        fields (`minute`, `hour`, `dayOfWeek`, `dayOfMonth`) or a raw `customCron` expression when
        `scheduleType` is `CUSTOM`; `timezone` defaults to UTC. The target `dashboardId` must belong
        to this deployment, otherwise `404` is returned. The created notification has no recipients
        — add them via `POST /notifications/{id}/recipients`.
      operationId: createNotification
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
          description: Numeric id of the deployment that owns the notification.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotificationInput'
        description: CreateNotificationInput
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationDto'
          description: ''
      summary: Create a scheduled notification
      tags:
        - Notifications
  /v1/deployments/{deploymentId}/notifications/{id}:
    delete:
      description: >-
        **🔒 Admin only.** Requires administrator privileges — the authenticated principal (API key,
        embed JWT, or any bearer token) must belong to a user with the admin role.


        Permanently deletes a scheduled notification and all of its recipients (main, embed, and
        Slack) in a single cascade. Returns `204 No Content` on success, or `404` if the
        notification does not belong to this deployment.
      operationId: deleteNotification
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
          description: Numeric id of the deployment that owns the notification.
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Numeric id of the notification (scheduled run).
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
        '204':
          description: Notification deleted.
      summary: Delete a scheduled notification
      tags:
        - Notifications
    get:
      description: >-
        **🔒 Admin only.** Requires administrator privileges — the authenticated principal (API key,
        embed JWT, or any bearer token) must belong to a user with the admin role.


        Returns a single scheduled notification by id, including its cron expression, timezone,
        enabled state, notification format, and a human-readable schedule summary. Returns `404` if
        the notification does not exist or does not belong to this deployment.
      operationId: getNotification
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
          description: Numeric id of the deployment that owns the notification.
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Numeric id of the notification (scheduled run).
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationDto'
          description: ''
      summary: Get a scheduled notification
      tags:
        - Notifications
    put:
      description: >-
        **🔒 Admin only.** Requires administrator privileges — the authenticated principal (API key,
        embed JWT, or any bearer token) must belong to a user with the admin role.


        Updates a notification’s schedule definition. Any subset of the schedule fields may be
        supplied (`scheduleType` + time fields or `customCron`, `timezone`), along with `isEnabled`,
        `notificationEnabled`, and `notificationFormat`. Omitted fields are left unchanged. This
        endpoint never modifies recipients — manage those through the `/recipients` sub-resource.
        Returns `404` if the notification is not part of this deployment.
      operationId: updateNotification
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
          description: Numeric id of the deployment that owns the notification.
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Numeric id of the notification (scheduled run).
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationInput'
        description: UpdateNotificationInput
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationDto'
          description: ''
      summary: Update a scheduled notification
      tags:
        - Notifications
  /v1/deployments/{deploymentId}/notifications/{id}/recipients:
    delete:
      description: >-
        **🔒 Admin only.** Requires administrator privileges — the authenticated principal (API key,
        embed JWT, or any bearer token) must belong to a user with the admin role.


        Unsubscribes one or more recipients (1–1000 per request) from a notification. Each entry is
        identified by `type` plus the `id` returned by the API — `userId` for `USER`, `embedUserId`
        for `EMBED_USER`, or `channelId` for `SLACK`. `EMBED_USER` entries must also include
        `embedTenantName`, which locates the recipient’s storage partition. Removals are idempotent
        (deleting a recipient that isn’t subscribed is a no-op). Returns `204 No Content`, or `404`
        if the notification is not part of this deployment.
      operationId: removeRecipients
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
          description: Numeric id of the deployment that owns the notification.
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Numeric id of the notification (scheduled run).
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveNotificationRecipientsInput'
        description: RemoveNotificationRecipientsInput
        required: false
      responses:
        '200':
          content:
            application/json: {}
          description: Successful response
        '204':
          description: Recipients removed.
      summary: Remove notification recipients
      tags:
        - Notifications
    get:
      description: >-
        **🔒 Admin only.** Requires administrator privileges — the authenticated principal (API key,
        embed JWT, or any bearer token) must belong to a user with the admin role.


        Returns the recipients subscribed to a notification, cursor-paginated and ordered by
        creation time (newest first). Recipients span three kinds, distinguished by `type`: `USER`
        (a main console user, with `userId` + `email`), `EMBED_USER` (an embed user, with
        `embedUserId`, `embedTenantName`, `externalId`, and `email`), and `SLACK` (a channel, with
        `channelId` + `channelName`). Returns `404` if the notification is not part of this
        deployment.
      operationId: getRecipients
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
          description: Numeric id of the deployment that owns the notification.
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Numeric id of the notification (scheduled run).
        - in: query
          name: first
          required: false
          schema:
            oneOf:
              - type: string
              - type: 'null'
            type: integer
            minimum: 1
            maximum: 200
          description: Page size for cursor pagination (default 100, max 200).
        - in: query
          name: after
          required: false
          schema:
            oneOf:
              - minimum: 1
                type: integer
              - type: 'null'
            type: string
          description: Opaque cursor for the next page; pass the previous response's `pageInfo.endCursor`.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRecipientsListResponse'
          description: ''
      summary: List notification recipients
      tags:
        - Notifications
    post:
      description: >-
        **🔒 Admin only.** Requires administrator privileges — the authenticated principal (API key,
        embed JWT, or any bearer token) must belong to a user with the admin role.


        Subscribes one or more recipients (1–1000 per request) to a notification. Each recipient is
        one of: a main console `USER` (identified by `userId` or `email`); an `EMBED_USER`
        (identified by `embedTenantName` + `externalId`, auto-provisioned if it does not yet exist,
        and optionally given `securityContext`, `userAttributes`, and `groups` that drive
        per-recipient rendering); or `SLACK` — **not yet supported**, a request containing a Slack
        recipient is rejected with `400`. Every recipient must resolve to a valid email (an embed
        user’s `email`, or an email-shaped `externalId`); otherwise the whole request fails with
        `400` before anything is written. The operation is idempotent: the response buckets each
        recipient into `createdRecipients`, `updatedRecipients` (an existing recipient whose embed
        properties changed), or `unchangedRecipients`.
      operationId: addRecipients
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: integer
          description: Numeric id of the deployment that owns the notification.
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Numeric id of the notification (scheduled run).
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddNotificationRecipientsInput'
        description: AddNotificationRecipientsInput
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationRecipientsMutationResponse'
          description: ''
      summary: Add notification recipients
      tags:
        - Notifications
  /v1/deployments/{deploymentId}/report-folders:
    get:
      operationId: getReportFolders
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportFoldersFindAllResult'
          description: ''
      summary: Get report folders
      tags:
        - Reports
  /v1/deployments/{deploymentId}/reports:
    get:
