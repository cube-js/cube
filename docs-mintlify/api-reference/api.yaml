  /v1/deployments/{deploymentId}/workspace:
    get:
      description: >-
        List the items in a deployment's workspace — folders, workbooks, and reports — in a single
        unified, paginated feed.


        By default this returns the items at the workspace root. Pass `folderId` to list the
        contents of a specific folder instead. Folders are always returned ahead of other item types
        so they render at the top of a listing.


        Supported query parameters:

        - `folderId` — list the contents of this folder (omit for the root).

        - `types` — restrict the results to one or more item types (`FOLDER`, `WORKBOOK`, `REPORT`).
        Repeat the parameter to pass several.

        - `search` — case-insensitive substring match on item names; searches across all folders,
        not just the current level.

        - `orderByField` / `orderByDirection` — sort the non-folder items (e.g. by `name`,
        `updated_at`, `created_at`, or `viewer_last_viewed_at`).

        - `first` / `after` — cursor-based pagination.


        Results are scoped to the calling user: only items the user can access are returned.
      operationId: workspaceObjects
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: number
        - in: query
          name: folderId
          schema:
            oneOf:
              - type: integer
              - type: 'null'
        - in: query
          name: types
          schema:
            oneOf:
              - items:
                  enum:
                    - FOLDER
                    - WORKBOOK
                    - REPORT
                  type: string
                type: array
              - type: 'null'
        - in: query
          name: orderByField
          schema:
            oneOf:
              - $ref: '#/components/schemas/GetWorkspaceObjectsQueryOrderByField'
              - type: 'null'
        - in: query
          name: orderByDirection
          schema:
            oneOf:
              - $ref: '#/components/schemas/GetWorkspaceObjectsQueryOrderByDirection'
              - type: 'null'
        - in: query
          name: search
          schema:
            oneOf:
              - type: string
              - type: 'null'
        - in: query
          name: after
          schema:
            type: string
        - in: query
          name: first
          schema:
            minimum: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceConnectionResponse'
          description: ''
      summary: List workspace items
      tags:
        - Workspace
  /v1/deployments/{deploymentId}/workspace/move:
    post:
      description: >-
        Move any workspace item — a workbook, report, or folder — into a folder, in one unified
        endpoint. Returns the moved item.


        Request body:

        - `type` — the item type: `WORKBOOK`, `REPORT`, or `FOLDER`.

        - `id` — the id of the item to move.

        - `folderId` — the destination folder id, or `null` to move the item to the workspace root.
        For a folder, this becomes its new parent.


        Access requirements depend on the item type and mirror the per-type rules:

        - **Workbook** — manage access to the workbook, plus edit access to the destination folder
        when moving into one.

        - **Report** — edit access to the report (with the report-manage permission).

        - **Folder** — manage access to the folder being moved, plus manage or edit access to the
        destination parent folder.


        Moving a folder into one of its own descendants, or exceeding the maximum folder depth, is
        rejected with `400`. Returns `404` if the item does not exist or belongs to a different
        deployment.
      operationId: moveWorkspaceObject
      parameters:
        - in: path
          name: deploymentId
          required: true
          schema:
            type: number
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveWorkspaceObjectInput'
        description: MoveWorkspaceObjectInput
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workbook'
          description: ''
      summary: Move a workspace item
      tags:
        - Workspace
