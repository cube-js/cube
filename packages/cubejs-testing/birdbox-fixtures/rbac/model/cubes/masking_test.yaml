cubes:
  - name: masking_test
    sql_table: public.line_items

    dimensions:
      - name: id
        sql: id
        type: number
        primary_key: true

      - name: secret_string
        sql: product_id
        mask:
          sql: "CONCAT('***', RIGHT(CAST({CUBE}.product_id AS TEXT), 2))"
        type: string

      - name: secret_number
        sql: price
        mask: -1
        type: number

      - name: secret_boolean
        sql: "CASE WHEN {CUBE}.quantity > 3 THEN TRUE ELSE FALSE END"
        mask: FALSE
        type: boolean

      - name: public_dim
        sql: order_id
        type: number

    measures:
      - name: count
        mask: 12345
        type: count

      - name: count_d
        sql: product_id
        mask: 34567
        type: count_distinct

      - name: total_quantity
        sql: quantity
        type: sum

    access_policy:
      - role: "*"
        member_level:
          includes: []
        member_masking:
          includes: "*"

      - role: "masking_full_access"
        member_level:
          includes: "*"
        row_level:
          allow_all: true

      - role: "masking_partial"
        member_level:
          includes:
            - id
            - public_dim
            - total_quantity
        member_masking:
          includes: "*"
        row_level:
          allow_all: true

  # Cube where all members are hidden by policy.
  # Members carry mask definitions so a view can apply masking on top.
  - name: masking_hidden_cube
    sql_table: public.line_items

    dimensions:
      - name: id
        sql: id
        type: number
        primary_key: true

      - name: secret_number
        sql: price
        mask: -1
        type: number

      - name: public_dim
        sql: order_id
        type: number

    measures:
      - name: count
        mask: 12345
        type: count

      - name: total_quantity
        sql: quantity
        type: sum

    access_policy:
      - role: "*"
        member_level:
          includes: []

views:
  # View with full access - no masking
  - name: masking_view
    cubes:
      - join_path: masking_test
        includes: "*"
    access_policy:
      - role: "*"
        member_level:
          includes: "*"
        row_level:
          allow_all: true

  # View with its own masking policy: all members masked for "*", full access for masking_full_access
  # Excludes secret_string (which has a SQL mask referencing {CUBE} columns)
  - name: masking_view_masked
    cubes:
      - join_path: masking_test
        includes:
          - secret_number
          - secret_boolean
          - public_dim
          - count
          - count_d
          - total_quantity
    access_policy:
      - role: "*"
        member_level:
          includes: []
        member_masking:
          includes: "*"
        row_level:
          allow_all: true
      - role: "masking_full_access"
        member_level:
          includes: "*"
        row_level:
          allow_all: true

  # View with partial masking: public_dim and total_quantity unmasked, rest masked
  # Excludes secret_string (which has a SQL mask referencing {CUBE} columns)
  - name: masking_view_partial
    cubes:
      - join_path: masking_test
        includes:
          - secret_number
          - secret_boolean
          - public_dim
          - count
          - count_d
          - total_quantity
    access_policy:
      - role: "*"
        member_level:
          includes:
            - public_dim
            - total_quantity
        member_masking:
          includes: "*"
        row_level:
          allow_all: true

  # View over a cube where all members are hidden.
  # The view adds its own masking policy — members that are invisible at
  # the cube level become accessible (some masked, some real) through the view.
  - name: masking_view_over_hidden_cube
    cubes:
      - join_path: masking_hidden_cube
        includes: "*"
    access_policy:
      - role: "*"
        member_level:
          includes:
            - public_dim
            - total_quantity
        member_masking:
          includes: "*"
        row_level:
          allow_all: true
      - role: "masking_full_access"
        member_level:
          includes: "*"
        row_level:
          allow_all: true
