cubes:
    - name: customers
      sql: "SELECT * FROM ms_customers"
      joins:
          - name: returns
            relationship: one_to_many
            sql: "{customers}.id = {returns.customer_id}"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: name
            type: string
            sql: name
          - name: city
            type: string
            sql: city
      measures:
          - name: count
            type: count

          - name: total_lifetime_value
            type: sum
            sql: lifetime_value

          # Multi-stage + time_shift measure where leaf becomes a multiplied
          # subquery: customers has one_to_many to returns, so when leaf is
          # grouped by returns.created_at month, customers rows are multiplied.
          # sum(lifetime_value) forces a full AggregateMultipliedSubquery
          # (keys-subquery + join back to customers) rather than COUNT DISTINCT.
          - name: total_lifetime_value_prev_month_by_returns
            type: number
            sql: "{CUBE.total_lifetime_value}"
            multi_stage: true
            time_shift:
                - interval: "1 month"
                  type: prior
                  timeDimension: returns.created_at

    - name: orders
      sql: "SELECT * FROM ms_orders"
      joins:
          - name: customers
            relationship: many_to_one
            sql: "{orders}.customer_id = {customers.id}"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: customer_id
            type: number
            sql: customer_id
          - name: status
            type: string
            sql: status
          - name: category
            type: string
            sql: category
          - name: amount
            type: number
            sql: amount
          - name: created_at
            type: time
            sql: created_at
          - name: updated_at
            type: time
            sql: updated_at

          # CORE-549 neighbor: a dimension `case` referencing a member
          # (category) not exposed by orders_ms_view. Unlike order_by, `case`
          # is not re-exported onto the view member, so it is reached through
          # the view member's direct sql reference and resolves against the
          # owning cube — it must keep building through the view.
          - name: category_label
            type: string
            case:
                when:
                    - sql: "{CUBE.category} = 'books'"
                      label: Literature
                else:
                    label: Other

          - name: customer_name
            type: string
            sql: "{customers.name}"
            multi_stage: true
            add_group_by:
                - customers.id
          - name: customer_city
            type: string
            sql: "{customers.city}"
            multi_stage: true
            add_group_by:
                - customers.id

      measures:
          - name: count
            type: count

          - name: total_amount
            type: sum
            sql: amount

          - name: avg_amount
            type: avg
            sql: amount

          - name: unique_customers
            type: count_distinct
            sql: customer_id

          - name: unique_customers_reduce_category
            type: sum
            sql: "{CUBE.unique_customers}"
            multi_stage: true
            reduce_by:
                - orders.category

          - name: avg_amount_reduce_category
            type: avg
            sql: "{CUBE.avg_amount}"
            multi_stage: true
            reduce_by:
                - orders.category

          - name: count_reduce_category
            type: sum
            sql: "{CUBE.count}"
            multi_stage: true
            reduce_by:
                - orders.category

          - name: max_total_amount_reduce_category
            type: max
            sql: "{CUBE.total_amount}"
            multi_stage: true
            reduce_by:
                - orders.category

          - name: amount_plus_customers_reduce_category
            type: number
            sql: "{CUBE.amount_reduce_category} + {CUBE.unique_customers_reduce_category}"
            multi_stage: true

          - name: max_amount
            type: max
            sql: amount

          - name: max_sum_reduce_category
            type: sum
            sql: "{CUBE.max_amount}"
            multi_stage: true
            reduce_by:
                - orders.category

          - name: total_by_customer_reduce_category
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            add_group_by:
                - orders.customer_id
            reduce_by:
                - orders.category

          - name: amount_by_id
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            add_group_by:
                - orders.id

          - name: amount_by_category
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            add_group_by:
                - orders.category

          - name: amount_by_status_category
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            add_group_by:
                - orders.status
                - orders.category

          - name: amount_reduce_category
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            reduce_by:
                - orders.category

          - name: amount_reduce_status
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            reduce_by:
                - orders.status

          # reduce_by targets the time dimension itself (bare, no
          # granularity). When the query selects created_at at some
          # granularity, that granular dimension must be dropped from the
          # partition regardless of its granularity suffix (CORE-550).
          - name: amount_reduce_time
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            reduce_by:
                - orders.created_at

          - name: amount_reduce_all
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            reduce_by:
                - orders.status
                - orders.category

          - name: amount_group_by_status
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.status

          - name: amount_group_by_category
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.category

          - name: amount_group_by_both
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.status
                - orders.category

          - name: amount_group_by_status_time
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.status
                - orders.created_at.month

          - name: amount_grain_keep_only_status
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            grain:
                keep_only:
                    - orders.status

          - name: amount_prev_month
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            time_shift:
                - interval: "1 month"
                  type: prior
                  timeDimension: orders.created_at

          - name: amount_next_month
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            time_shift:
                - interval: "1 month"
                  type: next
                  timeDimension: orders.created_at

          - name: count_prev_month
            type: number
            sql: "{CUBE.count}"
            multi_stage: true
            time_shift:
                - interval: "1 month"
                  type: prior
                  timeDimension: orders.created_at

          - name: amount_mom_diff
            type: number
            sql: "{CUBE.total_amount} - {CUBE.amount_prev_month}"
            multi_stage: true

          - name: mom_growth
            type: number
            sql: "({CUBE.total_amount} - {CUBE.amount_prev_month}) / NULLIF({CUBE.amount_prev_month}, 0)"
            multi_stage: true

          - name: category_share
            type: number
            sql: "{CUBE.total_amount} / NULLIF({CUBE.amount_reduce_category}, 0)"
            multi_stage: true

          - name: amount_rank
            type: rank
            multi_stage: true
            order_by:
                - sql: "{CUBE.total_amount}"
                  dir: desc

          - name: amount_rank_by_status
            type: rank
            multi_stage: true
            reduce_by:
                - orders.status
            order_by:
                - sql: "{CUBE.total_amount}"
                  dir: desc

          # CORE-549: order_by references a measure (avg_amount) that
          # orders_ms_view does not expose. Through the view the order_by
          # SqlCall must resolve against the owning cube (orders), not the
          # view — otherwise planning fails with "Cannot resolve: avg_amount".
          - name: amount_rank_order_by_hidden
            type: rank
            multi_stage: true
            reduce_by:
                - orders.status
            order_by:
                - sql: "{CUBE.avg_amount}"
                  dir: desc

          # CORE-549 neighbor: a measure `filters` referencing a member
          # (category) not exposed by orders_ms_view. `filters` is not
          # re-exported onto the view member, so it is reached through the
          # view member's direct sql reference and resolves against the
          # owning cube — it must keep building through the view.
          - name: amount_filtered_hidden
            type: sum
            sql: amount
            filters:
                - sql: "{CUBE.category} = 'books'"

          # Rank reduced by the time dimension (bare) while ordered by a
          # measure. With created_at selected at a granularity the partition
          # must be "all outer dims except created_at" (CORE-550); the buggy
          # planner left created_at_<gran> in PARTITION BY so every partition
          # held one row and all ranks collapsed to 1.
          - name: amount_rank_reduce_time
            type: rank
            multi_stage: true
            reduce_by:
                - orders.created_at
            order_by:
                - sql: "{CUBE.total_amount}"
                  dir: desc

          # Rank by the raw time dimension itself (order_by is a
          # dimension, not a measure) reduced by created_at — partition
          # is "all outer dims except created_at". First link in the
          # chain that reproduces the JS sql-generation scenario
          # "multi stage complex graph with time dimension no
          # granularity".
          - name: date_rank
            type: rank
            multi_stage: true
            reduce_by:
                - orders.created_at
            order_by:
                - sql: "{orders.created_at}"
                  dir: asc

          # Multi-stage formula that references date_rank in its SQL.
          - name: adjusted_amount
            type: number
            multi_stage: true
            sql: "{CUBE.total_amount} + 0.1 * {CUBE.date_rank}"

          # Rank over the adjusted_amount measure — second-link rank
          # that the outer sum filters by.
          - name: adjusted_amount_rank
            type: rank
            multi_stage: true
            reduce_by:
                - orders.created_at
            order_by:
                - sql: "{CUBE.adjusted_amount}"
                  dir: asc

          # Outer sum over adjusted_amount filtered by
          # adjusted_amount_rank = 1, grouped by created_at.
          - name: adjusted_amount_sum
            type: sum
            multi_stage: true
            sql: "{CUBE.adjusted_amount}"
            filters:
                - sql: "{CUBE.adjusted_amount_rank} = 1"
            add_group_by:
                - orders.created_at

          # CORE-602: end-of-period rank shared by two sibling consumers.
          # `eop_rank` keeps the last snapshot per status; both consumers
          # filter on `{eop_rank} = 1`, so a query selecting both must plan
          # the rank stage once and join both consumers to it.
          - name: eop_rank
            type: rank
            multi_stage: true
            order_by:
                - sql: "{CUBE.created_at}"
                  dir: desc
            grain:
                include:
                    - orders.status
                    - orders.created_at
                keep_only:
                    - orders.status

          - name: balance_eop_a
            type: sum
            multi_stage: true
            sql: "{CUBE.total_amount}"
            grain:
                include:
                    - orders.status
                    - orders.created_at
            filters:
                - sql: "{CUBE.eop_rank} = 1"

          - name: balance_eop_b
            type: sum
            multi_stage: true
            sql: "{CUBE.total_amount}"
            grain:
                include:
                    - orders.status
                    - orders.created_at
            filters:
                - sql: "{CUBE.eop_rank} = 1"

          - name: status_weighted_amount
            type: sum
            multi_stage: true
            case:
                switch: "{CUBE.status}"
                when:
                    - value: "completed"
                      sql: "{CUBE.total_amount}"
                    - value: "pending"
                      sql: "{CUBE.total_amount} * 0.5"
                else:
                    sql: "{CUBE.total_amount} * 0"

          - name: rolling_sum_7d
            type: sum
            sql: amount
            rolling_window:
                trailing: 7 day
                offset: start

          - name: total_amount_ytd
            type: sum
            sql: amount
            rolling_window:
                type: to_date
                granularity: year

          # ── filter: directive variants ────────────────────────────────────
          - name: amount_exclude_status
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            filter:
                exclude:
                    - orders.status

          - name: amount_keep_only_status
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            filter:
                keep_only:
                    - orders.status

          - name: amount_only_completed
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            filter:
                include:
                    - member: orders.status
                      operator: equals
                      values: [completed]

          - name: amount_or_completed_pending
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            filter:
                include:
                    - or:
                          - member: orders.status
                            operator: equals
                            values: [completed]
                          - member: orders.status
                            operator: equals
                            values: [pending]

          - name: amount_after_feb
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            filter:
                include:
                    - member: orders.created_at
                      operator: afterDate
                      values: ["2024-01-31"]

          - name: amount_replace_status
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            filter:
                exclude:
                    - orders.status
                include:
                    - member: orders.status
                      operator: equals
                      values: [cancelled]

          - name: amount_fixed_completed
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            filter:
                mode: fixed
                include:
                    - member: orders.status
                      operator: equals
                      values: [completed]

          # ── chain test: fixed vs relative when wrapped by another multi-stage ──
          # Inner X measures: same content (include category=books), only mode differs.
          - name: x_books_relative
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            filter:
                mode: relative
                include:
                    - member: orders.category
                      operator: equals
                      values: [books]

          - name: x_books_fixed
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            filter:
                mode: fixed
                include:
                    - member: orders.category
                      operator: equals
                      values: [books]

          # Wrapper T measures: filter include status=completed, reference inner X.
          # When X is computed as a dep of T, X's state inherits T's [status=completed].
          # X relative → state = [status=completed, category=books] → only completed×books.
          # X fixed    → state resets to applied_state → [category=books] → all statuses×books.
          - name: t_chain_relative
            type: number
            sql: "{CUBE.x_books_relative}"
            multi_stage: true
            filter:
                include:
                    - member: orders.status
                      operator: equals
                      values: [completed]

          - name: t_chain_fixed
            type: number
            sql: "{CUBE.x_books_fixed}"
            multi_stage: true
            filter:
                include:
                    - member: orders.status
                      operator: equals
                      values: [completed]

          # ── filter on segments ────────────────────────────────────────────
          - name: amount_exclude_segment
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            filter:
                exclude:
                    - orders.completed_orders

          - name: amount_keep_only_segment
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            filter:
                keep_only:
                    - orders.completed_orders

      segments:
          - name: completed_orders
            sql: "{CUBE}.status = 'completed'"

    - name: returns
      sql: "SELECT * FROM ms_returns"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: customer_id
            type: number
            sql: customer_id
          - name: created_at
            type: time
            sql: created_at
      measures:
          - name: count
            type: count
          - name: total_refund
            type: sum
            sql: refund_amount

views:
    - name: orders_ms_view
      cubes:
          - join_path: orders
            includes:
                - status
                - category
                - created_at
                - completed_orders
                - total_amount
                - amount_exclude_status
                - amount_keep_only_status
                - amount_exclude_segment
                - amount_keep_only_segment
                - amount_prev_month
                - mom_growth
                - amount_reduce_time
                - amount_rank_reduce_time
                - amount_rank_order_by_hidden
                - amount_filtered_hidden
                - category_label
