cubes:
    - name: customers
      sql: "SELECT * FROM mf_customers"
      joins:
          - name: orders
            relationship: one_to_many
            sql: "{customers}.id = {orders.customer_id}"
          - name: returns
            relationship: one_to_many
            sql: "{customers}.id = {returns.customer_id}"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: name
            type: string
            sql: name
          - name: city
            type: string
            sql: city
      measures:
          - name: count
            type: count

    - name: orders
      sql: "SELECT * FROM mf_orders"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: customer_id
            type: number
            sql: customer_id
          - name: amount
            type: number
            sql: amount
          - name: created_at
            type: time
            sql: created_at
      measures:
          - name: count
            type: count
          - name: total_amount
            type: sum
            sql: amount
          - name: rolling_sum_trailing_7d
            type: sum
            sql: amount
            rolling_window:
                trailing: 7 day

    - name: returns
      sql: "SELECT * FROM mf_returns"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: customer_id
            type: number
            sql: customer_id
          - name: reason
            type: string
            sql: reason
          - name: refund
            type: number
            sql: refund
          - name: created_at
            type: time
            sql: created_at
      measures:
          - name: count
            type: count
          - name: total_refund
            type: sum
            sql: refund
          - name: rolling_refund_7d
            type: sum
            sql: refund
            rolling_window:
                trailing: 7 day
          - name: rolling_count_7d
            type: count
            rolling_window:
                trailing: 7 day
