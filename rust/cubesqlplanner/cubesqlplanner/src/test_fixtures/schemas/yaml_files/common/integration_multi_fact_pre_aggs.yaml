cubes:
    - name: customers
      sql: "SELECT * FROM customers"
      joins:
          - name: orders
            relationship: one_to_many
            sql: "{customers}.id = {orders.customer_id}"
          - name: returns
            relationship: one_to_many
            sql: "{customers}.id = {returns.customer_id}"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: name
            type: string
            sql: name
          - name: city
            type: string
            sql: city
          - name: created_at
            type: time
            sql: created_at
      measures:
          - name: count
            type: count

    - name: orders
      sql: "SELECT * FROM orders"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: customer_id
            type: number
            sql: customer_id
          - name: status
            type: string
            sql: status
          - name: created_at
            type: time
            sql: created_at
      measures:
          - name: count
            type: count
          - name: total_amount
            type: sum
            sql: amount
      pre_aggregations:
          - name: orders_totals
            type: rollup
            measures:
                - count
                - total_amount
          - name: orders_by_customer_city
            type: rollup
            measures:
                - count
                - total_amount
            dimensions:
                - customers.city

    - name: returns
      sql: "SELECT * FROM returns"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: customer_id
            type: number
            sql: customer_id
          - name: reason
            type: string
            sql: reason
          - name: created_at
            type: time
            sql: created_at
      measures:
          - name: count
            type: count
          - name: total_refund
            type: sum
            sql: refund_amount
      pre_aggregations:
          - name: returns_totals
            type: rollup
            measures:
                - count
                - total_refund
          - name: returns_by_customer_city
            type: rollup
            measures:
                - count
                - total_refund
            dimensions:
                - customers.city
