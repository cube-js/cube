cubes:
    - name: customers
      sql: "SELECT * FROM ms_customers"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: name
            type: string
            sql: name
          - name: city
            type: string
            sql: city
      measures:
          - name: count
            type: count

    - name: orders
      sql: "SELECT * FROM ms_orders"
      joins:
          - name: customers
            relationship: many_to_one
            sql: "{orders}.customer_id = {customers.id}"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: customer_id
            type: number
            sql: customer_id
          - name: status
            type: string
            sql: status
          - name: category
            type: string
            sql: category
          - name: amount
            type: number
            sql: amount
          - name: created_at
            type: time
            sql: created_at
          # --- Cat 8: multi-stage dimensions ---
          - name: customer_name
            type: string
            sql: "{customers.name}"
            multi_stage: true
            add_group_by:
                - customers.id
          - name: customer_city
            type: string
            sql: "{customers.city}"
            multi_stage: true
            add_group_by:
                - customers.id

      measures:
          # --- Base measures ---
          - name: count
            type: count

          - name: total_amount
            type: sum
            sql: amount

          - name: avg_amount
            type: avg
            sql: amount

          # --- Cat 1: add_group_by ---
          - name: amount_by_id
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            add_group_by:
                - orders.id

          - name: amount_by_category
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            add_group_by:
                - orders.category

          - name: amount_by_status_category
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            add_group_by:
                - orders.status
                - orders.category

          # --- Cat 2: reduce_by ---
          - name: amount_reduce_category
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            reduce_by:
                - orders.category

          - name: amount_reduce_status
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            reduce_by:
                - orders.status

          - name: amount_reduce_all
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            reduce_by:
                - orders.status
                - orders.category

          # --- Cat 3: group_by ---
          - name: amount_group_by_status
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.status

          - name: amount_group_by_category
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.category

          - name: amount_group_by_both
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.status
                - orders.category

          - name: amount_group_by_status_time
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.status
                - orders.created_at.month

          # --- Cat 4-5: time_shift ---
          - name: amount_prev_month
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            time_shift:
                - interval: "1 month"
                  type: prior
                  timeDimension: orders.created_at

          - name: amount_next_month
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            time_shift:
                - interval: "1 month"
                  type: next
                  timeDimension: orders.created_at

          - name: count_prev_month
            type: number
            sql: "{CUBE.count}"
            multi_stage: true
            time_shift:
                - interval: "1 month"
                  type: prior
                  timeDimension: orders.created_at

          - name: amount_mom_diff
            type: number
            sql: "{CUBE.total_amount} - {CUBE.amount_prev_month}"
            multi_stage: true

          # --- Cat 6: calculated measures over multi-stage ---
          - name: mom_growth
            type: number
            sql: "({CUBE.total_amount} - {CUBE.amount_prev_month}) / NULLIF({CUBE.amount_prev_month}, 0)"
            multi_stage: true

          - name: category_share
            type: number
            sql: "{CUBE.total_amount} / NULLIF({CUBE.amount_reduce_category}, 0)"
            multi_stage: true

          # --- Cat 7: rank measures ---
          - name: amount_rank
            type: rank
            multi_stage: true
            order_by:
                - sql: "{CUBE.total_amount}"
                  dir: desc

          - name: amount_rank_by_status
            type: rank
            multi_stage: true
            reduce_by:
                - orders.status
            order_by:
                - sql: "{CUBE.total_amount}"
                  dir: desc

          # --- Cat 9: case/switch ---
          - name: status_weighted_amount
            type: number
            multi_stage: true
            case:
                switch: "{CUBE.status}"
                when:
                    - value: "completed"
                      sql: "{CUBE.total_amount}"
                    - value: "pending"
                      sql: "{CUBE.total_amount} * 0.5"
                else:
                    sql: "{CUBE.total_amount} * 0"

      segments:
          - name: completed_orders
            sql: "{CUBE}.status = 'completed'"
