cubes:
    - name: orders
      sql: "SELECT * FROM ms_orders"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: status
            type: string
            sql: status
          - name: category
            type: string
            sql: category
          - name: amount
            type: number
            sql: amount
          - name: created_at
            type: time
            sql: created_at

      measures:
          # --- Base measures ---
          - name: count
            type: count

          - name: total_amount
            type: sum
            sql: amount

          - name: avg_amount
            type: avg
            sql: amount

          # --- Cat 1: add_group_by ---
          - name: amount_by_id
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            add_group_by:
                - orders.id

          - name: amount_by_category
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            add_group_by:
                - orders.category

          - name: amount_by_status_category
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            add_group_by:
                - orders.status
                - orders.category

          # --- Cat 2: reduce_by ---
          - name: amount_reduce_category
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            reduce_by:
                - orders.category

          - name: amount_reduce_status
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            reduce_by:
                - orders.status

          - name: amount_reduce_all
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            reduce_by:
                - orders.status
                - orders.category

          # --- Cat 3: group_by ---
          - name: amount_group_by_status
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.status

          - name: amount_group_by_category
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.category

          - name: amount_group_by_both
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.status
                - orders.category

          - name: amount_group_by_status_time
            type: sum
            sql: "{CUBE.total_amount}"
            multi_stage: true
            group_by:
                - orders.status
                - orders.created_at.month

          # --- Cat 4-5: time_shift ---
          - name: amount_prev_month
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            time_shift:
                - interval: "1 month"
                  type: prior
                  timeDimension: orders.created_at

          - name: amount_next_month
            type: number
            sql: "{CUBE.total_amount}"
            multi_stage: true
            time_shift:
                - interval: "1 month"
                  type: next
                  timeDimension: orders.created_at

          - name: count_prev_month
            type: number
            sql: "{CUBE.count}"
            multi_stage: true
            time_shift:
                - interval: "1 month"
                  type: prior
                  timeDimension: orders.created_at

          - name: amount_mom_diff
            type: number
            sql: "{CUBE.total_amount} - {CUBE.amount_prev_month}"
            multi_stage: true
