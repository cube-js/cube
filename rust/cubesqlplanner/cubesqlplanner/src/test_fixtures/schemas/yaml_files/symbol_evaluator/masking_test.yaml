cubes:
    - name: masking_cube
      sql: "SELECT 1"
      dimensions:
          - name: id
            type: number
            sql: id
            primary_key: true
          - name: secret_number
            type: number
            sql: price
            resolved_mask_sql: "((-1))"
          - name: public_dim
            type: string
            sql: "{CUBE}.status"
            resolved_mask_sql: "(NULL)"
          - name: secret_with_sql_mask
            type: string
            sql: "{CUBE}.secret_col"
            resolved_mask_sql: "CONCAT('***', RIGHT(CAST({CUBE}.secret_col AS TEXT), 2))"
      measures:
          - name: count
            type: count
            resolved_mask_sql: "((12345))"
          - name: sum_revenue
            type: sum
            sql: revenue
            resolved_mask_sql: "((-1))"
          - name: real_count
            type: count
